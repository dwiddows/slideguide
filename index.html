<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trombone Positions: Bb Major Scale</title>
<style>
  :root {
    --brass: #e8b33d;
    --brass-bright: #ffd772;
    --brass-dim: #8a6a20;
    --bg: #0b0b0b;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--brass);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 {
    color: var(--brass-bright);
    font-size: 1.4em;
    letter-spacing: 0.04em;
    margin: 24px 0 4px;
    text-align: center;
  }
  .stage {
    width: 100%;
    max-width: 1500px;
    padding: 0 16px;
    box-sizing: border-box;
  }
  svg text {
    font-family: Georgia, 'Times New Roman', serif;
  }
  .toolbar {
    margin: 6px 0 18px;
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .toolbar .divider {
    width: 1px;
    height: 24px;
    background: var(--brass-dim);
    margin: 0 4px;
  }
  .staff-scroll {
    width: 100%;
    overflow-x: auto;
    margin-bottom: 18px;
  }
  .panels {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }
  .panel {
    display: flex;
    align-items: center;
    gap: 18px;
    width: 100%;
    max-width: 1400px;
  }
  .panel-label {
    flex: 0 0 170px;
    text-align: right;
  }
  .panel-label h2 {
    color: var(--brass-bright);
    font-size: 1.1em;
    margin: 0 0 4px;
  }
  .panel-label .panel-note {
    color: var(--brass-dim);
    font-size: 0.82em;
  }
  .panel .trombone-svg {
    flex: 1 1 auto;
    min-width: 0;
  }
  .trombone-svg {
    width: 100%;
    height: auto;
    display: block;
  }
  button {
    background: linear-gradient(180deg, var(--brass-bright), var(--brass-dim));
    color: #1a1200;
    border: none;
    border-radius: 6px;
    padding: 10px 22px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  button:not(:disabled):hover {
    background: linear-gradient(180deg, #fff0c0, var(--brass));
  }
  select {
    background: #1a1400;
    color: var(--brass);
    border: 1px solid var(--brass-dim);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: inherit;
  }
  .staff-note {
    fill: var(--brass);
    transition: fill 0.08s linear;
  }
  .staff-note.active {
    fill: #ff3b30;
  }
  .staff-label {
    fill: var(--brass-dim);
    transition: fill 0.08s linear;
  }
  .staff-label.active {
    fill: #ff3b30;
  }
</style>
</head>
<body>

<h1>Trombone Slide Positions</h1>

<div class="stage">
  <div class="toolbar">
    <select id="root-select"></select>
    <select id="type-select"></select>
    <div class="divider"></div>
    <button id="play-btn">&#9654; Play</button>
    <select id="tempo-select">
      <option value="650">Slow</option>
      <option value="420" selected>Medium</option>
      <option value="260">Fast</option>
    </select>
  </div>

  <div class="staff-scroll" id="staff-scroll">
    <svg id="staff-svg"></svg>
  </div>

  <div class="panels" id="panels"></div>
</div>

<script src="music-theory.js"></script>
<script src="trombone-positions.js"></script>
<script src="solver.js"></script>
<script src="trombone.js"></script>
</body>
</html>
