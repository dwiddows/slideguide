<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Trombone Positions: Bb Major Scale</title>
<style>
  :root {
    --brass: #e8b33d;
    --brass-bright: #ffd772;
    --brass-dim: #8a6a20;
    --bg: #0b0b0b;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--brass);
    font-family: Georgia, 'Times New Roman', serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 {
    color: var(--brass-bright);
    font-size: 1.4em;
    letter-spacing: 0.04em;
    margin: 24px 0 4px;
    text-align: center;
  }
  .stage {
    width: 100%;
    max-width: 900px;
    padding: 0 16px;
    box-sizing: border-box;
  }
  svg text {
    font-family: Georgia, 'Times New Roman', serif;
  }
  .controls {
    margin: 22px 0 40px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    background: linear-gradient(180deg, var(--brass-bright), var(--brass-dim));
    color: #1a1200;
    border: none;
    border-radius: 6px;
    padding: 10px 22px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
  }
  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
  button:not(:disabled):hover {
    background: linear-gradient(180deg, #fff0c0, var(--brass));
  }
  select {
    background: #1a1400;
    color: var(--brass);
    border: 1px solid var(--brass-dim);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: inherit;
  }
  .staff-note {
    fill: var(--brass);
    transition: fill 0.08s linear;
  }
  .staff-note.active {
    fill: #ff3b30;
  }
  .staff-label {
    fill: var(--brass-dim);
    font-size: 13px;
    transition: fill 0.08s linear;
  }
  .staff-label.active {
    fill: #ff3b30;
  }
</style>
</head>
<body>

<h1>Trombone Slide Positions &mdash; B&flat; Major Scale</h1>

<div class="stage">
  <svg id="staff-svg" viewBox="0 0 950 200" width="100%" height="200"></svg>
  <svg id="trombone-svg" viewBox="0 0 900 220" width="100%" height="220"></svg>
</div>

<div class="controls">
  <button id="play-btn">&#9654; Play the scale</button>
  <select id="tempo-select">
    <option value="650">Slow</option>
    <option value="420" selected>Medium</option>
    <option value="260">Fast</option>
  </select>
</div>

<script src="trombone.js"></script>
</body>
</html>
